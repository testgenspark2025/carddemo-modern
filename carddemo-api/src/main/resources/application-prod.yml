spring:
  datasource:
    # Render Postgres only exposes a "postgresql://..." connectionString. We construct
    # the JDBC URL ourselves from the broken-out properties wired via render.yaml.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  flyway:
    baseline-on-migrate: true
  jpa:
    open-in-view: false

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    com.carddemo: INFO
