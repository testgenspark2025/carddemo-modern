spring:
  application:
    name: carddemo-api
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/carddemo
    username: carddemo
    password: carddemo
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

carddemo:
  jwt:
    secret: change-me-to-a-long-random-base64-secret-at-least-256-bits-long-please
    expiration-minutes: 60

logging:
  level:
    org.springframework.security: INFO
    com.carddemo: DEBUG
