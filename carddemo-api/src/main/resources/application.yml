spring:
  application:
    name: carddemo-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/carddemo}
    username: ${SPRING_DATASOURCE_USERNAME:carddemo}
    password: ${SPRING_DATASOURCE_PASSWORD:carddemo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: ${PORT:8080}

carddemo:
  jwt:
    secret: ${CARDDEMO_JWT_SECRET:change-me-to-a-long-random-base64-secret-at-least-256-bits-long-please}
    expiration-minutes: ${CARDDEMO_JWT_EXPIRY_MIN:60}
  data:
    dir: ${CARDDEMO_DATA_DIR:file:/home/factory-user/repos/carddemo/app/data/ASCII}
    acct: ${carddemo.data.dir}/acctdata.txt
    cust: ${carddemo.data.dir}/custdata.txt
    xref: ${carddemo.data.dir}/cardxref.txt
    discgrp: ${carddemo.data.dir}/discgrp.txt
    tcatbal: ${carddemo.data.dir}/tcatbal.txt

logging:
  level:
    org.springframework.security: INFO
    com.carddemo: INFO
